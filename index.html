<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>

    生産管理システム

  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <header class="header">

    生産管理システム

  </header>


  <!-- 登録 -->

  <section class="top-section">

    <input
      type="text"
      id="drawingInput"
      placeholder="図番"
    >

    <input
      type="text"
      id="serialInput"
      placeholder="シリアル"
    >

    <button onclick="registerProduct()">

      製品登録

    </button>

  </section>


  <!-- 製品一覧 -->

  <section class="list-section">

    <h2>

      稼働製品一覧

    </h2>

    <div id="productList"></div>

  </section>


  <!-- ページ切替 -->

  <section class="menu-section">

    <button onclick="showPage('timelinePage')">

      タイムライン

    </button>

    <button onclick="showPage('weekPage')">

      週間表示

    </button>

    <button onclick="showPage('monthPage')">

      月間表示

    </button>

  </section>


  <!-- タイムライン -->

  <section
    id="timelinePage"
    class="page active"
  >

    <h2>

      3日タイムライン

    </h2>

    <div id="timelineContainer"></div>

  </section>


  <!-- 週間 -->

  <section
    id="weekPage"
    class="page"
  >

    <h2>

      週間表示

    </h2>

    <div
      id="weekContainer"
      class="week-grid"
    ></div>

  </section>


  <!-- 月間 -->

  <section
    id="monthPage"
    class="page"
  >

    <h2>

      月間表示

    </h2>

    <div id="monthContainer"></div>

  </section>


  <script src="script.js"></script>

</body>

</html>
