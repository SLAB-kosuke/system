<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    生産管理システム
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <!-- ヘッダー -->

  <header class="header">

    生産管理システム

  </header>


  <!-- 登録 -->

  <section class="top-section">

    <div id="reader"></div>

    <input
      type="text"
      id="drawingInput"
      placeholder="図番"
    >

    <input
      type="text"
      id="serialInput"
      placeholder="シリアル"
    >

    <button id="registerBtn">

      製品登録

    </button>

    <button id="scanBtn">

      QR読取

    </button>

  </section>


  <!-- 製品一覧 -->

  <section class="list-section">

    <h2>

      製品一覧

    </h2>

    <div id="productList"></div>

  </section>


  <!-- メニュー -->

  <section class="menu-section">

    <button data-page="planPage">

      予定ガント

    </button>

    <button data-page="actualPage">

      加工進捗

    </button>

    <button data-page="weekPage">

      週間表示

    </button>

    <button data-page="monthPage">

      月間表示

    </button>

  </section>


  <!-- 予定ガント -->

  <section
    id="planPage"
    class="page active"
  >

    <h2>

      予定ガント

    </h2>

    <div id="planTimeline"></div>

  </section>


  <!--加工進捗 -->

  <section
    id="actualPage"
    class="page"
  >

    <h2>

      加工進捗

    </h2>

    <div id="actualTimeline"></div>

  </section>


  <!-- 週間 -->

  <section
    id="weekPage"
    class="page"
  >

    <h2>

      週間表示

    </h2>

    <div
      id="weekContainer"
      class="week-grid"
    ></div>

  </section>


  <!-- 月間 -->

  <section
    id="monthPage"
    class="page"
  >

    <h2>

      月間表示

    </h2>

    <div id="monthContainer"></div>

  </section>


  <!-- QR -->

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <!-- script -->

  <script src="script.js"></script>

</body>

</html>
