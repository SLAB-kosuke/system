<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>工程ガントチャート</title>

<style>
/* =========================
   ベース
========================= */
body {
  margin: 0;
  font-family: Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  background: #f4f6f8;
}

.container {
  padding: 16px;
}

/* =========================
   入力エリア
========================= */
.form {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

input, select, button {
  padding: 6px;
  font-size: 13px;
}

/* =========================
   ガント全体
========================= */
.gantt-container {
  background: #fff;
  padding: 10px;
  border-radius: 8px;
  overflow-x: auto;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.gantt-row {
  position: relative;
  height: 42px;
  border-bottom: 1px solid #eee;
}

.gantt-label {
  position: absolute;
  left: 0;
  top: 0;
  width: 120px;
  line-height: 42px;
  font-size: 13px;
  font-weight: bold;
}

.gantt-track {
  margin-left: 130px;
  position: relative;
  height: 100%;
  background: #fafafa;
}

/* =========================
   バー
========================= */
.gantt-bar {
  position: absolute;
  height: 22px;
  top: 10px;
  border-radius: 6px;
  font-size: 11px;
  color: #fff;
  padding: 2px 6px;
  white-space: nowrap;
  overflow: hidden;
}

/* 状態 */
.yotei { background:#3498db; }
.tyuushi { background:#f39c12; }
.kanryo { background:#2ecc71; }
.horyu { background:#95a5a6; }

/* =========================
   予定終了ライン
========================= */
.planned-end {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: red;
  z-index: 5;
}

.planned-end::after {
  content: "予定";
  position: absolute;
  top: -16px;
  left: -10px;
  font-size: 10px;
  color: red;
}

/* =========================
   テーブル
========================= */
table {
  width: 100%;
  margin-top: 16px;
  border-collapse: collapse;
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #eee;
  font-size: 13px;
}

th {
  background: #f0f0f0;
  text-align: left;
}

button {
  cursor: pointer;
  border: none;
  border-radius: 4px;
}

.btn-del { background:#e74c3c; color:#fff; }
</style>

</head>

<body>
<div class="container">

  <h3>工程ガント</h3>

  <!-- 入力 -->
  <div class="form">
    <input id="title" placeholder="工程名">
    <input id="start" type="datetime-local">
    <input id="end" type="datetime-local">

    <select id="status">
      <option value="yotei">予定</option>
      <option value="tyuushi">中断</option>
      <option value="kanryo">完了</option>
      <option value="horyu">保留</option>
    </select>

    <button onclick="addTask()">追加</button>
  </div>

  <!-- ガント -->
  <div id="gantt" class="gantt-container"></div>

  <!-- 一覧 -->
  <table>
    <thead>
      <tr>
        <th>工程</th>
        <th>開始</th>
        <th>終了</th>
        <th>状態</th>
        <th>削除</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ===== Firebase設定（ここだけ自分のに差し替え） ===== */
const firebaseConfig = {
  apiKey: "XXXX",
  authDomain: "XXXX",
  projectId: "XXXX",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const col = collection(db, "tasks");

/* ===== 基準（1時間=20px） ===== */
const PX_PER_HOUR = 20;

/* =========================
   追加
========================= */
window.addTask = async function () {
  const title = document.getElementById("title").value;
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const status = document.getElementById("status").value;

  if (!title || !start || !end) return;

  await addDoc(col, { title, start, end, status });

  load();
};

/* =========================
   削除
========================= */
window.del = async function (id) {
  await deleteDoc(doc(db, "tasks", id));
  load();
};

/* =========================
   読み込み
========================= */
async function load() {
  const snap = await getDocs(col);

  const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  render(data);
}

/* =========================
   描画
========================= */
function render(data) {
  const gantt = document.getElementById("gantt");
  const list = document.getElementById("list");

  gantt.innerHTML = "";
  list.innerHTML = "";

  if (data.length === 0) return;

  const base = new Date(Math.min(...data.map(d => new Date(d.start))));

  data.forEach(task => {
    const start = new Date(task.start);
    const end = new Date(task.end);

    const left = (start - base) / (1000 * 60 * 60) * PX_PER_HOUR;
    const width = (end - start) / (1000 * 60 * 60) * PX_PER_HOUR;

    /* ===== 行 ===== */
    const row = document.createElement("div");
    row.className = "gantt-row";

    row.innerHTML = `
      <div class="gantt-label">${task.title}</div>
      <div class="gantt-track">

        <div class="gantt-bar ${task.status}"
          style="left:${left}px;width:${width}px">
          ${task.title}
        </div>

        <div class="planned-end"
          style="left:${left + width}px"></div>

      </div>
    `;

    gantt.appendChild(row);

    /* ===== 一覧 ===== */
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${task.title}</td>
      <td>${task.start}</td>
      <td>${task.end}</td>
      <td>${task.status}</td>
      <td><button class="btn-del" onclick="del('${task.id}')">削除</button></td>
    `;
    list.appendChild(tr);
  });
}

/* 初期ロード */
load();
</script>

</body>
</html>
