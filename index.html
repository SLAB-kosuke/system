<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>工程管理システム（復旧版）</title>

<style>
body {
  margin: 0;
  font-family: Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  background: #f4f6f8;
}

.container { padding: 16px; }

.form {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

input, select, button {
  padding: 6px;
  font-size: 13px;
}

.mode {
  margin: 10px 0;
}

.gantt-container {
  background: #fff;
  padding: 10px;
  border-radius: 8px;
}

.gantt-row {
  position: relative;
  height: 42px;
  border-bottom: 1px solid #eee;
}

.gantt-label {
  position: absolute;
  width: 120px;
  left: 0;
  line-height: 42px;
  font-size: 12px;
  font-weight: bold;
}

.gantt-track {
  margin-left: 130px;
  position: relative;
  height: 100%;
  background: #fafafa;
}

.gantt-bar {
  position: absolute;
  height: 20px;
  top: 11px;
  border-radius: 5px;
  color: #fff;
  font-size: 11px;
  padding: 2px 5px;
}

.yotei { background:#3498db; }
.tyuushi { background:#f39c12; }
.kanryo { background:#2ecc71; }
.horyu { background:#95a5a6; }

.end-line {
  position: absolute;
  width: 2px;
  top: 0;
  bottom: 0;
  background: red;
}

table {
  width: 100%;
  margin-top: 15px;
  background: #fff;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #eee;
  font-size: 12px;
}
</style>
</head>

<body>
<div class="container">

<h3>工程管理（復旧版）</h3>

<!-- QR（復活用枠だけ） -->
<div>
  <input placeholder="QR（後で復活可能）" id="qr">
</div>

<!-- 入力 -->
<div class="form">
  <input id="title" placeholder="工程名">
  <input id="start" type="datetime-local">
  <input id="end" type="datetime-local">

  <select id="status">
    <option value="yotei">予定</option>
    <option value="tyuushi">中断</option>
    <option value="kanryo">完了</option>
    <option value="horyu">保留</option>
  </select>

  <button onclick="addTask()">追加</button>
</div>

<!-- 表示切替（復活） -->
<div class="mode">
  <button onclick="mode='week';load()">週間</button>
  <button onclick="mode='month';load()">月間</button>
  <button onclick="mode='all';load()">全体</button>
</div>

<!-- ガント -->
<div id="gantt" class="gantt-container"></div>

<!-- 一覧 -->
<table>
  <thead>
    <tr>
      <th>工程</th>
      <th>開始</th>
      <th>終了</th>
      <th>状態</th>
      <th>削除</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
