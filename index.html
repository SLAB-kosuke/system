<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>作業ログ入力</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<header>
  <h1>作業ログ入力</h1>
  <a href="logs.html" class="logs-link">
    ログ一覧
  </a>
</header>

<main>

  <!-- QR読取 -->

  <section class="card">

    <h2>QRコード読取</h2>

    <div id="reader"></div>

    <button id="startQrBtn" class="primary-btn">
      QR読取開始
    </button>

    <button id="stopQrBtn" class="secondary-btn">
      QR停止
    </button>

  </section>

  <!-- 読取結果 -->

  <section class="card">

    <h2>製品情報</h2>

    <div class="input-group">

      <label>図番</label>

      <input
        type="text"
        id="partNo"
        readonly
      >

    </div>

    <div class="input-group">

      <label>シリアル</label>

      <input
        type="text"
        id="serial"
        readonly
      >

    </div>

  </section>

  <!-- 工程 -->

  <section class="card">

    <h2>工程選択</h2>

    <div id="processButtons" class="button-grid">

      <button class="process-btn" data-process="荒①">
        荒①
      </button>

      <button class="process-btn" data-process="仕上①">
        仕上①
      </button>

      <button class="process-btn" data-process="荒②">
        荒②
      </button>

      <button class="process-btn" data-process="仕上②">
        仕上②
      </button>

      <button class="process-btn" data-process="検査">
        検査
      </button>

    </div>

  </section>

  <!-- 状態 -->

  <section class="card">

    <h2>状態記録</h2>

    <div class="button-grid">

      <button
        class="status-btn start"
        data-status="開始"
      >
        開始
      </button>

      <button
        class="status-btn pause"
        data-status="中断"
      >
        中断
      </button>

      <button
        class="status-btn resume"
        data-status="再開"
      >
        再開
      </button>

      <button
        class="status-btn complete"
        data-status="完了"
      >
        完了
      </button>

      <button
        class="status-btn hold"
        data-status="保留"
      >
        保留
      </button>

    </div>

  </section>

  <!-- 選択状況 -->

  <section class="card">

    <h2>現在の選択</h2>

    <div class="selected-info">

      <div>

        <span class="label">
          工程：
        </span>

        <span id="selectedProcess">
          未選択
        </span>

      </div>

      <div>

        <span class="label">
          状態：
        </span>

        <span id="selectedStatus">
          未選択
        </span>

      </div>

    </div>

  </section>

  <!-- 保存メッセージ -->

  <section class="card">

    <div id="message">
      QR読取後に工程を選択してください
    </div>

  </section>

</main>

<script type="module" src="script.js"></script>

</body>
</html>
