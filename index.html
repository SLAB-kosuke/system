<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    生産管理システム
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <header class="header">

    生産管理システム

  </header>


  <!-- 製品登録 -->

  <section class="register-section">

    <h2>

      製品登録

    </h2>

    <div class="form-grid">

      <input
        type="text"
        id="drawing"
        placeholder="図番"
      >

      <input
        type="text"
        id="serial"
        placeholder="シリアル"
      >

      <input
        type="date"
        id="arrivalDate"
      >

      <input
        type="datetime-local"
        id="startDate"
      >

      <input
        type="datetime-local"
        id="shipmentDate"
      >

      <input
        type="text"
        id="staff"
        placeholder="担当"
      >

      <select id="priority">

        <option value="低">
          低
        </option>

        <option value="中">
          中
        </option>

        <option value="高">
          高
        </option>

      </select>

      <textarea
        id="memo"
        placeholder="備考"
      ></textarea>

    </div>

    <button onclick="saveProduct()">

      登録

    </button>

  </section>


  <!-- 製品一覧 -->

  <section class="product-section">

    <h2>

      稼働製品一覧

    </h2>

    <div
      id="productList"
      class="product-list"
    ></div>

  </section>


  <!-- ページ切替 -->

  <section class="button-section">

    <button onclick="showPage('timelinePage')">

      タイムライン

    </button>

    <button onclick="showPage('weekPage')">

      週間表示

    </button>

    <button onclick="showPage('monthPage')">

      月間表示

    </button>

  </section>


  <!-- タイムライン -->

  <section
    id="timelinePage"
    class="page active"
  >

    <h2>

      3日タイムライン

    </h2>

    <div id="timelineContainer"></div>

  </section>


  <!-- 週間 -->

  <section
    id="weekPage"
    class="page"
  >

    <h2>

      週間表示

    </h2>

    <div
      id="weekContainer"
      class="week-grid"
    ></div>

  </section>


  <!-- 月間 -->

  <section
    id="monthPage"
    class="page"
  >

    <h2>

      月間表示

    </h2>

    <div id="monthContainer"></div>

  </section>


  <script src="script.js"></script>

</body>

</html>
