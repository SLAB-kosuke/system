<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>作業ログ一覧</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>

  <h1>作業ログ一覧</h1>

  <div class="header-buttons">

    <a href="index.html" class="back-link">
      入力画面
    </a>

    <button id="csvBtn" class="primary-btn">
      CSV出力
    </button>

  </div>

</header>

<main>

  <!-- 件数 -->

  <section class="card">

    <div class="summary">

      <div>
        登録件数：
        <span id="totalCount">0</span>
      </div>

      <div>
        進行中：
        <span id="activeCount">0</span>
      </div>

    </div>

  </section>

  <!-- 現在進行中 -->

  <section class="card">

    <h2>現在進行中</h2>

    <div id="activeList">

      <div class="empty-message">
        データなし
      </div>

    </div>

  </section>

  <!-- 検索 -->

  <section class="card">

    <h2>検索</h2>

    <input
      type="text"
      id="searchText"
      placeholder="図番またはシリアル"
    >

  </section>

  <!-- 履歴 -->

  <section class="card">

    <h2>作業履歴</h2>

    <div id="historyList">

      <div class="empty-message">
        読み込み中...
      </div>

    </div>

  </section>

</main>

<!-- 履歴カードテンプレート -->

<template id="historyTemplate">

  <div class="log-card">

    <div class="product-row">

      <div class="product-color"></div>

      <div class="product-info">

        <div class="part-no"></div>

        <div class="serial-no"></div>

      </div>

    </div>

    <div class="log-detail">

      <div>
        工程：
        <span class="process"></span>
      </div>

      <div>
        状態：
        <span class="status"></span>
      </div>

      <div>
        日時：
        <span class="datetime"></span>
      </div>

    </div>

  </div>

</template>

<!-- 進行中テンプレート -->

<template id="activeTemplate">

  <div class="active-card">

    <div class="product-row">

      <div class="product-color"></div>

      <div class="product-info">

        <div class="part-no"></div>

        <div class="serial-no"></div>

      </div>

    </div>

    <div class="active-status">

      <div>
        工程：
        <span class="process"></span>
      </div>

      <div>
        状態：
        <span class="status"></span>
      </div>

      <div>
        更新：
        <span class="datetime"></span>
      </div>

    </div>

  </div>

</template>

<script type="module" src="script.js"></script>

</body>
</html>
